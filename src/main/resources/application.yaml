spring:
  application:
    name: prices

  datasource:
    url: jdbc:h2:mem:pricesdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false

  sql:
    init:
      mode: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
